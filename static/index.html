<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OculOS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23111113' stroke='%234c8dff' stroke-width='2'/><circle cx='16' cy='16' r='6' fill='%234c8dff'/></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111113;--surface:#19191c;--raised:#222225;--border:#2c2c30;
  --border-subtle:#232327;--text:#ececee;--text-2:#a0a0a8;--text-3:#6b6b74;
  --blue:#4c8dff;--blue-dim:rgba(76,141,255,.1);--green:#3ec97a;--green-dim:rgba(62,201,122,.1);
  --red:#ef5050;--red-dim:rgba(239,80,80,.1);--amber:#e0a030;--amber-dim:rgba(224,160,48,.1);
  --purple:#9580ff;--purple-dim:rgba(149,128,255,.1);--cyan:#40c8e0;--cyan-dim:rgba(64,200,224,.1);
  --sans:'Inter',system-ui,-apple-system,sans-serif;--mono:'IBM Plex Mono','Menlo',monospace;
  --radius:6px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--sans);display:flex;flex-direction:column}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ── topbar ── */
.topbar{display:flex;align-items:center;height:42px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.topbar-brand{font:600 14px var(--sans);color:var(--text);letter-spacing:-.3px}
.topbar-sep{width:1px;height:16px;background:var(--border)}
.topbar-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2)}
.topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.topbar-dot.err{background:var(--red)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-kbd{font:11px var(--mono);color:var(--text-3);padding:1px 5px;border:1px solid var(--border);border-radius:3px}

/* ── layout ── */
.main{flex:1;display:grid;grid-template-columns:260px 1fr 320px;overflow:hidden}
.col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.col:last-child{border-right:none}

.col-head{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:34px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.col-title{font:500 11px var(--sans);color:var(--text-3);text-transform:uppercase;letter-spacing:.5px}
.col-count{font:500 10px var(--mono);color:var(--text-3);background:var(--raised);padding:0 5px;border-radius:3px;line-height:18px}
.col-body{flex:1;overflow-y:auto}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;gap:4px;font:500 11px var(--sans);color:var(--text-2);background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;transition:all .12s}
.btn:hover{color:var(--text);border-color:var(--text-3)}
.btn-sm{padding:1px 6px;font-size:10px}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#5a96ff}
.btn-danger{color:var(--red);border-color:transparent}
.btn-danger:hover{background:var(--red-dim);border-color:var(--red)}

/* ── search ── */
.search-box{padding:8px 12px;border-bottom:1px solid var(--border)}
.search-input{width:100%;height:28px;background:var(--raised);border:1px solid var(--border);border-radius:4px;padding:0 8px;font:12px var(--sans);color:var(--text);outline:none;transition:border .12s}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text-3)}

/* ── windows list ── */
.win-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border-subtle);transition:background .1s}
.win-item:hover{background:var(--raised)}
.win-item.active{background:var(--blue-dim);border-left:2px solid var(--blue)}
.win-name{font:500 12px var(--sans);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.win-info{display:flex;gap:6px;margin-top:3px}
.chip{font:11px var(--mono);color:var(--text-3);line-height:1}
.chip b{color:var(--text-2);font-weight:500}
.win-actions{display:flex;gap:3px;margin-left:auto;opacity:0;transition:opacity .1s}
.win-item:hover .win-actions{opacity:1}
.win-act{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:3px;background:none;color:var(--text-3);cursor:pointer;font-size:10px;transition:all .1s}
.win-act:hover{color:var(--text);border-color:var(--text-3);background:var(--raised)}
.win-act.danger:hover{color:var(--red);border-color:var(--red);background:var(--red-dim)}

/* ── tree ── */
.tree-wrap{padding:4px 8px}
.tnode{}
.trow{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:var(--radius);cursor:pointer;transition:background .08s;min-height:24px}
.trow:hover{background:var(--raised)}
.trow.sel{background:var(--blue-dim)}
.ttoggle{width:16px;flex-shrink:0;text-align:center;font-size:9px;color:var(--text-3);cursor:pointer;user-select:none}
.ttoggle:hover{color:var(--text)}
.ttype{font:500 10px var(--mono);padding:1px 4px;border-radius:3px;flex-shrink:0;white-space:nowrap}
.tlabel{font:12px var(--sans);color:var(--text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow.sel .tlabel{color:var(--text)}
.tchildren{padding-left:14px}

/* type badges */
.tb-Window{background:var(--cyan-dim);color:var(--cyan)}.tb-Button{background:var(--green-dim);color:var(--green)}
.tb-Edit{background:var(--amber-dim);color:var(--amber)}.tb-Text{background:rgba(160,160,168,.1);color:var(--text-3)}
.tb-CheckBox,.tb-RadioButton{background:var(--purple-dim);color:var(--purple)}
.tb-MenuItem,.tb-Menu{background:var(--purple-dim);color:var(--purple)}
.tb-TabItem{background:var(--cyan-dim);color:var(--cyan)}
.tb-Link{background:var(--blue-dim);color:var(--blue)}
.tb-Image{background:var(--amber-dim);color:var(--amber)}
.tb-ListItem,.tb-TreeItem{background:rgba(160,160,168,.08);color:var(--text-2)}
.tb-default{background:rgba(160,160,168,.06);color:var(--text-3)}

/* ── right col: tabs ── */
.right-col{display:flex;flex-direction:column;overflow:hidden;border-right:none}
.tab-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.tab{padding:0 14px;height:34px;display:flex;align-items:center;font:500 11px var(--sans);color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .1s}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--text);border-bottom-color:var(--blue)}
.tab-body{flex:1;overflow-y:auto;display:none}
.tab-body.active{display:block}

/* ── detail ── */
.detail-wrap{padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.d-section{background:var(--raised);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:8px 10px}
.d-title{font:600 10px var(--sans);color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.d-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:12px}
.d-row+.d-row{border-top:1px solid var(--border-subtle)}
.d-key{color:var(--text-3);font-size:11px}
.d-val{color:var(--text);font:500 11px var(--mono);max-width:170px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-val.on{color:var(--green)}.d-val.off{color:var(--red)}

.d-actions{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:2px}
.act-btn{height:30px;display:flex;align-items:center;justify-content:center;gap:4px;font:500 11px var(--sans);color:var(--text-2);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s}
.act-btn:hover{color:var(--text);border-color:var(--text-3);background:var(--raised)}
.act-btn.primary{color:var(--blue);border-color:rgba(76,141,255,.3)}
.act-btn.primary:hover{background:var(--blue-dim)}
.act-btn.wide{grid-column:span 2}

.act-input{width:100%;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:0 8px;font:12px var(--sans);color:var(--text);outline:none;transition:border .12s}
.act-input:focus{border-color:var(--blue)}
.act-input::placeholder{color:var(--text-3)}

/* ── log ── */
.log-row{display:flex;align-items:center;gap:8px;padding:4px 12px;font:11px var(--mono);border-bottom:1px solid var(--border-subtle)}
.log-row:hover{background:var(--raised)}
.log-t{color:var(--text-3);flex-shrink:0;width:58px}
.log-m{flex-shrink:0;font-weight:500;width:36px}
.log-m.GET{color:var(--green)}.log-m.POST{color:var(--amber)}
.log-p{color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-ms{color:var(--text-3);flex-shrink:0}
.log-s{flex-shrink:0;width:6px;height:6px;border-radius:50%}
.log-s.ok{background:var(--green)}.log-s.err{background:var(--red)}

/* ── empty / loading ── */
.empty{padding:32px 16px;text-align:center;color:var(--text-3);font-size:12px}
.loading{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── toast ── */
.toast-wrap{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:999;pointer-events:none}
.toast{padding:8px 14px;border-radius:var(--radius);font:12px var(--sans);color:var(--text);background:var(--raised);border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.4);opacity:0;transform:translateY(8px);animation:toast-in .2s forwards}
.toast.ok{border-color:rgba(62,201,122,.3)}.toast.err{border-color:rgba(239,80,80,.3);color:var(--red)}
@keyframes toast-in{to{opacity:1;transform:translateY(0)}}

/* ── json panel ── */
.json-wrap{padding:10px 12px}
.json-pre{background:var(--raised);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:10px;font:11px/1.6 var(--mono);color:var(--text-2);overflow:auto;max-height:calc(100vh - 200px);white-space:pre-wrap;word-break:break-all}
.copy-row{display:flex;gap:4px;margin-bottom:6px}
.copy-btn{display:inline-flex;align-items:center;gap:4px;font:500 10px var(--sans);color:var(--text-3);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;transition:all .12s}
.copy-btn:hover{color:var(--text);border-color:var(--text-3)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

/* ── uptime ── */
.topbar-uptime{font:11px var(--mono);color:var(--text-3)}

/* ── ws indicator ── */
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);flex-shrink:0;transition:background .2s}
.ws-dot.on{background:var(--cyan);box-shadow:0 0 4px var(--cyan)}

/* ── recorder ── */
.rec-bar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--text-3);flex-shrink:0}
.rec-dot.recording{background:var(--red);animation:rec-pulse 1s ease-in-out infinite}
@keyframes rec-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-label{font:500 11px var(--sans);color:var(--text-3)}
.rec-label.recording{color:var(--red)}
.rec-count{font:10px var(--mono);color:var(--text-3);margin-left:auto}
.rec-export{position:relative}
.rec-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--raised);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;z-index:10;min-width:120px}
.rec-dropdown.open{display:block}
.rec-dropdown button{display:block;width:100%;padding:6px 12px;font:11px var(--sans);color:var(--text-2);background:none;border:none;text-align:left;cursor:pointer}
.rec-dropdown button:hover{background:var(--surface);color:var(--text)}

/* ── highlight btn in actions ── */
.act-btn.highlight{color:var(--cyan);border-color:rgba(64,200,224,.3)}
.act-btn.highlight:hover{background:var(--cyan-dim)}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">OculOS</span>
  <div class="topbar-sep"></div>
  <div class="topbar-status">
    <div class="topbar-dot" id="sDot"></div>
    <span id="sTxt">Connecting</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-uptime" id="uptime"></span>
    <div class="topbar-sep"></div>
    <div class="ws-dot" id="wsDot" title="WebSocket disconnected"></div>
    <div class="topbar-sep"></div>
    <span class="topbar-kbd" title="Refresh windows">R</span>
    <span class="topbar-kbd" title="Search tree">/ </span>
    <span class="topbar-kbd" title="Expand all">E</span>
    <span class="topbar-kbd" title="Collapse all">C</span>
  </div>
</div>

<div class="main">

  <!-- col 1: windows -->
  <div class="col">
    <div class="col-head">
      <span class="col-title">Windows</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="col-count" id="winCount">0</span>
        <button class="btn btn-sm" onclick="loadWindows()" title="Refresh (R)">Refresh</button>
      </div>
    </div>
    <div class="col-body" id="winList"><div class="empty">Loading&hellip;</div></div>
  </div>

  <!-- col 2: tree -->
  <div class="col" style="min-width:0">
    <div class="col-head">
      <span class="col-title" id="treeTitle">Element tree</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="col-count" id="nodeCount">0</span>
        <div id="treeSpin" style="display:none"><div class="loading"></div></div>
      </div>
    </div>
    <div class="search-box">
      <input class="search-input" id="treeSearch" placeholder="Filter elements&hellip;" oninput="filterTree()"/>
    </div>
    <div class="col-body">
      <div class="tree-wrap" id="treeCt"><div class="empty">Pick a window to inspect.</div></div>
    </div>
  </div>

  <!-- col 3: detail + log (tabbed) -->
  <div class="col right-col">
    <div class="tab-bar">
      <div class="tab active" data-tab="detail" onclick="switchTab('detail',this)">Inspector</div>
      <div class="tab" data-tab="json" onclick="switchTab('json',this)">JSON</div>
      <div class="tab" data-tab="recorder" onclick="switchTab('recorder',this)">Recorder</div>
      <div class="tab" data-tab="log" onclick="switchTab('log',this)">API Log</div>
    </div>

    <div class="tab-body active" id="panelDetail">
      <div class="empty" id="detailEmpty">Select an element.</div>
    </div>

    <div class="tab-body" id="panelJson">
      <div class="empty" id="jsonEmpty">Select an element to view its JSON.</div>
    </div>

    <div class="tab-body" id="panelRecorder">
      <div class="rec-bar">
        <div class="rec-dot" id="recDot"></div>
        <span class="rec-label" id="recLabel">Stopped</span>
        <span class="rec-count" id="recCount">0 steps</span>
        <button class="btn btn-sm" id="recToggle" onclick="toggleRecording()">Record</button>
        <div class="rec-export">
          <button class="btn btn-sm" onclick="toggleExportMenu()" id="recExportBtn" disabled>Export</button>
          <div class="rec-dropdown" id="recDropdown">
            <button onclick="exportAs('python')">Python</button>
            <button onclick="exportAs('javascript')">JavaScript</button>
            <button onclick="exportAs('curl')">curl</button>
          </div>
        </div>
      </div>
      <div id="recSteps"><div class="empty">Press Record then interact with elements.</div></div>
    </div>

    <div class="tab-body" id="panelLog">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border)">
        <span style="font:500 11px var(--sans);color:var(--text-3)">Requests</span>
        <button class="btn btn-sm btn-danger" onclick="clearLog()">Clear</button>
      </div>
      <div id="logList"><div class="empty" id="logEmpty">No requests yet.</div></div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const API='';
let selWin=null,selElem=null,logN=0,allElements=[],nodeTotal=0;

// ── toast ──
function toast(msg,type='ok'){
  const d=document.createElement('div');d.className='toast '+type;d.textContent=msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transform='translateY(8px)';setTimeout(()=>d.remove(),200)},2400);
}

// ── tabs ──
function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===el));
  document.querySelectorAll('.tab-body').forEach(p=>p.classList.toggle('active',p.id==='panel'+id.charAt(0).toUpperCase()+id.slice(1)));
}

// ── api ──
async function api(method,path,body){
  const t0=Date.now();
  try{
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(API+path,opts),d=await r.json();
    addLog(method,path,r.ok?'ok':'err',Date.now()-t0);
    return d;
  }catch(e){addLog(method,path,'err',Date.now()-t0);throw e}
}

// ── log ──
function addLog(method,path,status,ms){
  const el=document.getElementById('logEmpty');if(el)el.remove();
  const p=document.getElementById('logList'),d=document.createElement('div');d.className='log-row';
  const now=new Date(),ts=[now.getHours(),now.getMinutes(),now.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
  d.innerHTML=`<span class="log-s ${status}"></span><span class="log-t">${ts}</span><span class="log-m ${method}">${method}</span><span class="log-p">${path}</span><span class="log-ms">${ms}ms</span>`;
  p.insertBefore(d,p.firstChild);logN++;if(logN>200)p.lastChild?.remove();
}
function clearLog(){document.getElementById('logList').innerHTML='<div class="empty" id="logEmpty">No requests yet.</div>';logN=0;}

// ── status ──
function setStatus(ok){
  document.getElementById('sDot').className='topbar-dot'+(ok?'':' err');
  document.getElementById('sTxt').textContent=ok?'Connected':'Disconnected';
}

// ── windows ──
async function loadWindows(){
  const el=document.getElementById('winList');el.innerHTML='<div class="empty"><div class="loading"></div></div>';
  try{const d=await api('GET','/windows');if(!d.success)throw new Error(d.error);renderWins(d.data);setStatus(true)}
  catch(e){el.innerHTML=`<div class="empty" style="color:var(--red)">${e.message}</div>`;setStatus(false)}
}

function renderWins(ws){
  const el=document.getElementById('winList');document.getElementById('winCount').textContent=ws.length;
  if(!ws.length){el.innerHTML='<div class="empty">No windows detected.</div>';return}
  el.innerHTML='';
  ws.forEach(w=>{
    const d=document.createElement('div');d.className='win-item'+(selWin?.pid===w.pid&&selWin?.title===w.title?' active':'');
    const esc=s=>(s||'').replace(/</g,'&lt;');
    d.innerHTML=`<div style="display:flex;align-items:center;gap:6px"><div class="win-name" style="flex:1" title="${esc(w.title)}">${esc(w.title)||'Untitled'}</div><div class="win-actions"><button class="win-act" onclick="event.stopPropagation();winFocus(${w.pid})" title="Focus window">&#9650;</button><button class="win-act danger" onclick="event.stopPropagation();winClose(${w.pid})" title="Close window">&times;</button></div></div>
      <div class="win-info"><span class="chip"><b>${w.pid}</b></span><span class="chip">${esc(w.exe_name)}</span>${w.rect.width?`<span class="chip">${w.rect.width}&times;${w.rect.height}</span>`:''}</div>`;
    d.onclick=()=>{document.querySelectorAll('.win-item').forEach(x=>x.classList.remove('active'));d.classList.add('active');selWin=w;loadTree(w.pid,w.title)};
    el.appendChild(d);
  });
}

// ── tree ──
async function loadTree(pid,title){
  document.getElementById('treeTitle').textContent=title||'Element tree';
  document.getElementById('treeSpin').style.display='';
  const ct=document.getElementById('treeCt');ct.innerHTML='';allElements=[];nodeTotal=0;
  try{
    const d=await api('GET',`/windows/${pid}/tree`);if(!d.success)throw new Error(d.error);
    ct.appendChild(buildNode(d.data,true));
    document.getElementById('nodeCount').textContent=nodeTotal;
  }catch(e){ct.innerHTML=`<div class="empty" style="color:var(--red)">${e.message}</div>`}
  finally{document.getElementById('treeSpin').style.display='none'}
}

function buildNode(el,expandRoot){
  nodeTotal++;allElements.push(el);
  const div=document.createElement('div');div.className='tnode';div.dataset.label=(el.label||'').toLowerCase();div.dataset.type=(el.type||'').toLowerCase();
  const row=document.createElement('div');row.className='trow';row.dataset.id=el.oculos_id;
  const hasKids=el.children&&el.children.length>0;
  const tc='tb-'+(el.type||'default');const tcFinal=document.createElement('span');
  tcFinal.className='ttype '+(tc.match(/^tb-(Window|Button|Edit|Text|CheckBox|RadioButton|MenuItem|Menu|TabItem|Link|Image|ListItem|TreeItem)$/)?tc:'tb-default');
  tcFinal.textContent=el.type||'?';
  const tog=document.createElement('span');tog.className='ttoggle';
  tog.textContent=hasKids?(expandRoot?'\u25BC':'\u25B6'):'\u00B7';
  const lbl=document.createElement('span');lbl.className='tlabel';lbl.title=el.label||'';
  lbl.textContent=el.label||el.automation_id||el.class_name||'\u2014';
  row.appendChild(tog);row.appendChild(tcFinal);row.appendChild(lbl);
  row.addEventListener('click',e=>{e.stopPropagation();selectEl(el,row)});
  tog.addEventListener('click',e=>{
    e.stopPropagation();
    if(!hasKids)return;
    const ch=div.querySelector(':scope>.tchildren');
    if(ch){const vis=ch.style.display!=='none';ch.style.display=vis?'none':'';tog.textContent=vis?'\u25B6':'\u25BC'}
  });
  div.appendChild(row);
  if(hasKids){
    const ch=document.createElement('div');ch.className='tchildren';
    if(!expandRoot)ch.style.display='none';
    el.children.forEach(c=>ch.appendChild(buildNode(c,false)));
    div.appendChild(ch);
  }
  return div;
}

function selectEl(el,row){
  document.querySelectorAll('.trow').forEach(r=>r.classList.remove('sel'));
  row.classList.add('sel');selElem=el;renderDetail(el);renderJson(el);
  switchTab('detail',document.querySelector('.tab[data-tab="detail"]'));
}

// ── filter ──
function filterTree(){
  const q=document.getElementById('treeSearch').value.toLowerCase().trim();
  document.querySelectorAll('.tnode').forEach(n=>{
    if(!q){n.style.display='';return}
    const match=n.dataset.label.includes(q)||n.dataset.type.includes(q);
    n.style.display=match?'':'none';
    if(match){let p=n.parentElement;while(p&&p.classList){if(p.classList.contains('tchildren'))p.style.display='';p=p.parentElement}}
  });
}

// ── expand/collapse all ──
function expandAll(){document.querySelectorAll('.tchildren').forEach(c=>c.style.display='');document.querySelectorAll('.ttoggle').forEach(t=>{if(t.textContent==='\u25B6')t.textContent='\u25BC'})}
function collapseAll(){document.querySelectorAll('.tchildren').forEach(c=>c.style.display='none');document.querySelectorAll('.ttoggle').forEach(t=>{if(t.textContent==='\u25BC')t.textContent='\u25B6'})}

// ── detail ──
function renderDetail(el){
  const p=document.getElementById('panelDetail');
  const esc=s=>String(s??'').replace(/</g,'&lt;');
  const id=el.oculos_id;
  const acts=el.actions||[];

  if(acts.includes('click'))actionsHtml+=`<button class="act-btn primary" onclick="doAction('click','${id}')">Click</button>`;
  if(acts.includes('focus'))actionsHtml+=`<button class="act-btn" onclick="doAction('focus','${id}')">Focus</button>`;
  if(acts.includes('toggle'))actionsHtml+=`<button class="act-btn" onclick="doAction('toggle','${id}')">Toggle</button>`;
  if(acts.includes('select'))actionsHtml+=`<button class="act-btn" onclick="doAction('select','${id}')">Select</button>`;
  if(acts.includes('expand'))actionsHtml+=`<button class="act-btn" onclick="doAction('expand','${id}')">Expand</button>`;
  if(acts.includes('collapse'))actionsHtml+=`<button class="act-btn" onclick="doAction('collapse','${id}')">Collapse</button>`;
  if(acts.includes('scroll-into-view'))actionsHtml+=`<button class="act-btn" onclick="doAction('scroll-into-view','${id}')">Scroll into view</button>`;
  actionsHtml+=`<button class="act-btn highlight" onclick="doHighlight('${id}')">Highlight</button>`;

  let textHtml='';
  if(acts.includes('set-text'))textHtml=`
    <div class="d-section">
      <div class="d-title">Set text</div>
      <input class="act-input" id="txtIn" placeholder="New value&hellip;" value="${esc(el.value||'')}"/>
      <div style="margin-top:4px"><button class="act-btn primary wide" onclick="doSetText('${id}')">Apply</button></div>
    </div>`;

  let keysHtml='';

    <div class="d-section">
      <div class="d-title">Range</div>
      <div class="d-row"><span class="d-key">Current</span><span class="d-val">${el.range.value}</span></div>
      <div class="d-row"><span class="d-key">Min / Max</span><span class="d-val">${el.range.minimum} \u2013 ${el.range.maximum}</span></div>
      <input class="act-input" id="rangeIn" type="number" min="${el.range.minimum}" max="${el.range.maximum}" step="${el.range.step||1}" value="${el.range.value}"/>

        <button class="act-btn" onclick="doScroll('${id}','down')">Down</button>
        <button class="act-btn" onclick="doScroll('${id}','left')">Left</button>
        <button class="act-btn" onclick="doScroll('${id}','right')">Right</button>
      </div>
    </div>`;

  p.innerHTML=`<div class="detail-wrap">
    <div class="d-section">
      <div class="d-title">Identity</div>
      <div class="d-row"><span class="d-key">ID</span><span class="d-val" style="cursor:pointer" title="Click to copy: ${id}" onclick="copyText('${id}')">${id.substring(0,8)}&hellip; <span style='font-size:9px;color:var(--text-3)'>&#x2398;</span></span></div>
      <div class="d-row"><span class="d-key">Type</span><span class="d-val">${el.type||'\u2014'}</span></div>
      <div class="d-row"><span class="d-key">Label</span><span class="d-val">${esc(el.label)||'\u2014'}</span></div>
      <div class="d-row"><span class="d-key">Value</span><span class="d-val">${esc(el.value)||'\u2014'}</span></div>
      ${el.automation_id?`<div class="d-row"><span class="d-key">Automation ID</span><span class="d-val">${esc(el.automation_id)}</span></div>`:''}
      ${el.class_name?`<div class="d-row"><span class="d-key">Class</span><span class="d-val">${esc(el.class_name)}</span></div>`:''}
      ${el.help_text?`<div class="d-row"><span class="d-key">Help</span><span class="d-val">${esc(el.help_text)}</span></div>`:''}
    </div>

      <div class="d-title">Layout</div>
      <div class="d-row"><span class="d-key">Position</span><span class="d-val">${el.rect.x}, ${el.rect.y}</span></div>
      <div class="d-row"><span class="d-key">Size</span><span class="d-val">${el.rect.width} \u00d7 ${el.rect.height}</span></div>
    </div>

      <div class="d-row"><span class="d-key">Enabled</span><span class="d-val ${el.enabled?'on':'off'}">${el.enabled?'Yes':'No'}</span></div>
      <div class="d-row"><span class="d-key">Focused</span><span class="d-val ${el.focused?'on':''}">${el.focused?'Yes':'No'}</span></div>
      ${el.toggle_state!=null?`<div class="d-row"><span class="d-key">Toggle</span><span class="d-val">${el.toggle_state}</span></div>`:''}
      ${el.is_selected!=null?`<div class="d-row"><span class="d-key">Selected</span><span class="d-val">${el.is_selected?'Yes':'No'}</span></div>`:''}

// ── interactions ──
async function doAction(action,id){
  try{const d=await api('POST',`/interact/${id}/${action}`);if(!d.success)throw new Error(d.error);toast(`${action} OK`)}
  catch(e){toast(`${action}: ${e.message}`,'err')}
}
async function doSetText(id){
  const v=document.getElementById('txtIn')?.value;if(v==null)return;
  try{const d=await api('POST',`/interact/${id}/set-text`,{text:v});if(!d.success)throw new Error(d.error);toast('Text set')}
  catch(e){toast('Set text: '+e.message,'err')}
}
async function doSendKeys(id){
  const v=document.getElementById('keysIn')?.value;if(!v)return;
  try{const d=await api('POST',`/interact/${id}/send-keys`,{keys:v});if(!d.success)throw new Error(d.error);toast('Keys sent')}
  catch(e){toast('Send keys: '+e.message,'err')}
}
async function doSetRange(id){
  const v=parseFloat(document.getElementById('rangeIn')?.value);if(isNaN(v))return;
  try{const d=await api('POST',`/interact/${id}/set-range`,{value:v});if(!d.success)throw new Error(d.error);toast('Range set')}
  catch(e){toast('Set range: '+e.message,'err')}
}
async function doScroll(id,dir){
  try{const d=await api('POST',`/interact/${id}/scroll`,{direction:dir});if(!d.success)throw new Error(d.error);recAdd('scroll',id,{direction:dir});toast('Scrolled '+dir)}
  catch(e){toast('Scroll: '+e.message,'err')}
}
async function doHighlight(id){
  try{const d=await api('POST',`/interact/${id}/highlight`,{duration_ms:2000});if(!d.success)throw new Error(d.error);toast('Highlighted')}
  catch(e){toast('Highlight: '+e.message,'err')}
}

// ── window management ──
async function winFocus(pid){
  try{const d=await api('POST',`/windows/${pid}/focus`);if(!d.success)throw new Error(d.error);toast('Window focused')}
  catch(e){toast('Focus: '+e.message,'err')}
}
async function winClose(pid){
  try{const d=await api('POST',`/windows/${pid}/close`);if(!d.success)throw new Error(d.error);toast('Window closed');setTimeout(loadWindows,500)}
  catch(e){toast('Close: '+e.message,'err')}
}

// ── copy ──
function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>toast('Copied to clipboard')).catch(()=>toast('Copy failed','err'));
}

// ── json panel ──
function renderJson(el){
  const p=document.getElementById('panelJson');
  const clean={...el};delete clean.children;
  const json=JSON.stringify(clean,null,2);
  p.innerHTML=`<div class="json-wrap">
    <div class="copy-row">
      <button class="copy-btn" onclick="copyJson(this)">Copy JSON</button>
      <button class="copy-btn" onclick="copyText('${el.oculos_id}')">Copy ID</button>
    </div>
    <pre class="json-pre">${json.replace(/</g,'&lt;')}</pre>
  </div>`;
}
function copyJson(btn){
  if(!selElem)return;
  const clean={...selElem};delete clean.children;
  navigator.clipboard.writeText(JSON.stringify(clean,null,2)).then(()=>{
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy JSON';btn.classList.remove('copied')},1500);
  });
}

// ── recorder ──
let recording=false, recSteps=[];
function recAdd(action,id,body){
  if(!recording)return;
  recSteps.push({action,id,body:body||null,ts:Date.now()});
  updateRecUI();
}
function toggleRecording(){
  recording=!recording;
  if(recording){recSteps=[];}
  document.getElementById('recDot').className='rec-dot'+(recording?' recording':'');
  document.getElementById('recLabel').className='rec-label'+(recording?' recording':'');
  document.getElementById('recLabel').textContent=recording?'Recording':'Stopped';
  document.getElementById('recToggle').textContent=recording?'Stop':'Record';
  document.getElementById('recExportBtn').disabled=recording||recSteps.length===0;
  updateRecUI();
}
function updateRecUI(){
  document.getElementById('recCount').textContent=recSteps.length+' steps';
  document.getElementById('recExportBtn').disabled=recording||recSteps.length===0;
  const ct=document.getElementById('recSteps');
  if(!recSteps.length){ct.innerHTML='<div class="empty">Press Record then interact with elements.</div>';return}
  ct.innerHTML='';
  recSteps.forEach((s,i)=>{
    const d=document.createElement('div');d.className='log-row';
    const t=new Date(s.ts),ts=[t.getHours(),t.getMinutes(),t.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
    d.innerHTML=`<span class="log-s ok"></span><span class="log-t">${ts}</span><span class="log-m POST" style="width:auto">${s.action}</span><span class="log-p">${s.id.substring(0,8)}${s.body?(' '+JSON.stringify(s.body)):''}</span><span class="log-ms">#${i+1}</span>`;
    ct.appendChild(d);
  });
}
function toggleExportMenu(){
  const dd=document.getElementById('recDropdown');
  dd.classList.toggle('open');
  setTimeout(()=>{document.addEventListener('click',()=>dd.classList.remove('open'),{once:true})},0);
}
function exportAs(lang){
  document.getElementById('recDropdown').classList.remove('open');
  let code='';
  const base='http://127.0.0.1:7878';
  if(lang==='python'){
    code='import requests\n\n';
    recSteps.forEach((s,i)=>{
      const url=`${base}/interact/${s.id}/${s.action}`;
      if(s.body)code+=`# Step ${i+1}: ${s.action}\nrequests.post("${url}", json=${JSON.stringify(s.body).replace(/"/g,"'")})\n\n`;
      else code+=`# Step ${i+1}: ${s.action}\nrequests.post("${url}")\n\n`;
    });
  } else if(lang==='javascript'){
    code='const API = "http://127.0.0.1:7878";\n\n';
    recSteps.forEach((s,i)=>{
      const path=`/interact/${s.id}/${s.action}`;
      if(s.body)code+=`// Step ${i+1}: ${s.action}\nawait fetch(API + "${path}", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(${JSON.stringify(s.body)}) });\n\n`;
      else code+=`// Step ${i+1}: ${s.action}\nawait fetch(API + "${path}", { method: "POST" });\n\n`;
    });
  } else if(lang==='curl'){
    recSteps.forEach((s,i)=>{
      const url=`${base}/interact/${s.id}/${s.action}`;
      if(s.body)code+=`# Step ${i+1}: ${s.action}\ncurl -s -X POST -H "Content-Type: application/json" -d '${JSON.stringify(s.body)}' "${url}"\n\n`;
      else code+=`# Step ${i+1}: ${s.action}\ncurl -s -X POST "${url}"\n\n`;
    });
  }
  navigator.clipboard.writeText(code).then(()=>toast(`${lang} script copied (${recSteps.length} steps)`)).catch(()=>{
    const w=window.open('','_blank');if(w){w.document.write('<pre>'+code.replace(/</g,'&lt;')+'</pre>');}
  });
}

// ── health / uptime ──
async function fetchHealth(){
  try{
    const r=await fetch('/health');
    const d=await r.json();
    if(d.success&&d.data){
      const s=d.data.uptime_secs;
      const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
      const parts=[];
      if(h)parts.push(h+'h');
      if(m)parts.push(m+'m');
      parts.push(sec+'s');
      document.getElementById('uptime').textContent='up '+parts.join(' ');
      document.getElementById('uptime').title=`v${d.data.version} | ${d.data.platform} ${d.data.arch}`;
    }
  }catch(e){}
}

// ── WebSocket ──
let ws=null,wsRetry=0;
function connectWs(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen=()=>{
    wsRetry=0;
    document.getElementById('wsDot').className='ws-dot on';
    document.getElementById('wsDot').title='WebSocket connected';
  };
  ws.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);
      if(msg.type==='action'){
        // flash the WS dot
        const dot=document.getElementById('wsDot');
        dot.style.background='var(--green)';
        setTimeout(()=>dot.style.background='',300);
      }
    }catch(err){}
  };
  ws.onclose=()=>{
    document.getElementById('wsDot').className='ws-dot';
    document.getElementById('wsDot').title='WebSocket disconnected';
    wsRetry++;
    setTimeout(connectWs,Math.min(wsRetry*1000,10000));
  };
  ws.onerror=()=>ws.close();
}

// ── keyboard shortcuts ──
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='r'||e.key==='R'){e.preventDefault();loadWindows()}
  if(e.key==='/'){e.preventDefault();document.getElementById('treeSearch').focus()}
  if(e.key==='e'||e.key==='E'){e.preventDefault();expandAll()}
  if(e.key==='c'||e.key==='C'){e.preventDefault();collapseAll()}
  if(e.key==='j'||e.key==='J'){e.preventDefault();if(selElem)switchTab('json',document.querySelector('.tab[data-tab="json"]'))}
  if(e.key==='h'||e.key==='H'){e.preventDefault();if(selElem)doHighlight(selElem.oculos_id)}
});

// ── init ──
loadWindows();
fetchHealth();
connectWs();
setInterval(()=>{if(!document.hidden)loadWindows()},10000);
setInterval(fetchHealth,5000);
</script>
